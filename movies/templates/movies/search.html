{% load static %}
<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>ČSFD Vyhledávání</title>
    <link rel="stylesheet" href="{% static 'movies/css/style.css' %}">
</head>
<body>

    <h1>ČSFD Top 300 Vyhledávání</h1>
    
    <input type="text" id="search-input" class="search-box" placeholder="Zadejte název filmu nebo jméno herce..." autocomplete="off">

    <div class="results-container">
        <div class="column">
            <h2>Filmy</h2>
            <ul id="movies-list">
                <li class="status-msg">Zadejte alespoň 2 znaky pro vyhledávání...</li>
            </ul>
        </div>

        <div class="column">
            <h2>Herci</h2>
            <ul id="actors-list">
                <li class="status-msg">Zadejte alespoň 2 znaky pro vyhledávání...</li>
            </ul>
        </div>
    </div>

    <script src="{% static 'movies/js/search.js' %}"></script>
</body>
</html>

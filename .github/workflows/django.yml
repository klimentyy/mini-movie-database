name: Django Server CI/CD Pipeline

on:
  push:
    branches: 
      - "main"
      - "feature/**"
  pull_request:
    branches: 
      - "main"

jobs:
  # -------------------------------------------------------------
  # STAGE 1: Environment Compilation & Linting/Checks
  # -------------------------------------------------------------
  environment-and-integrity-check:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install Pipenv
      run: |
        python -m pip install --upgrade pip
        pip install pipenv

    - name: Install dependencies
      run: |
        pipenv install --dev

    - name: Verify application configuration syntax
      run: |
        pipenv run python manage.py check

  # -------------------------------------------------------------
  # STAGE 2: Database Migration Integrity
  # -------------------------------------------------------------
  database-migration-check:
    runs-on: ubuntu-latest
    needs: environment-and-integrity-check
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install Pipenv
      run: |
        python -m pip install --upgrade pip
        pip install pipenv

    - name: Install dependencies
      run: |
        pipenv install --dev

    - name: Dry-run database migration executions
      run: |
        pipenv run python manage.py migrate

  # -------------------------------------------------------------
  # STAGE 3: Test Automation Suite
  # -------------------------------------------------------------
  unit-testing-suite:
    runs-on: ubuntu-latest
    needs: database-migration-check
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install Pipenv
      run: |
        python -m pip install --upgrade pip
        pip install pipenv

    - name: Install dependencies
      run: |
        pipenv install --dev

    - name: Execute automated unit tests
      run: |
        pipenv run python manage.py test